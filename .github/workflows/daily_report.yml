name: Daily Match Report

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  generate_report:
    runs-on: ubuntu-latest
    steps:
      - name: Call Wasmer Agent
        id: fetch
        run: |
          RESPONSE=$(curl -s -w "%{http_code}" -X POST https://code-agent.wasmer.app/webhook \
            -H "Content-Type: application/json" \
            -d '{"post_type":"message","message":"生成战报"}')
          
          HTTP_CODE="${RESPONSE: -3}"
          BODY="${RESPONSE%???}"
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          echo "$BODY" > report.txt
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: match-report
          path: report.txt