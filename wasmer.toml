[package]
entrypoint = "start"

[dependencies]
"python/python" = "=3.12.8"
"wasmer/bash" = "=1.0.25"

[fs]
"/app" = "."
"/opt/venv" = ".venv"

[[command]]
name = "start"
module = "python/python:python"
runner = "wasi"

[command.annotations.wasi]
cwd = "/app"
main-args = ["-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]
env = [
    "PYTHONEXECUTABLE=/bin/python",
    "PYTHONPATH=/app:/opt/venv/lib/python3.12/site-packages",
    "HOME=/app",
]